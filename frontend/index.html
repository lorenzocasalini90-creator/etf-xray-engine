<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CheckMyETFs — Analizza il tuo portafoglio ETF</title>
  <meta name="description" content="Analizza il tuo portafoglio ETF UCITS: overlap, ridondanza, esposizione reale e factor fingerprint. Gratuito, senza registrazione.">
  <meta property="og:title" content="CheckMyETFs">
  <meta property="og:description" content="Scopri quanto si sovrappongono i tuoi ETF. Analisi gratuita in 30 secondi.">
  <meta property="og:url" content="https://www.checkmyetfs.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6YX8DRY3Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E6YX8DRY3Z');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <!-- Plotly.js -->
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>

  <!-- SheetJS for XLSX upload -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="topbar"></nav>

  <section id="landing-hero">
    <div class="lh-inner">
      <span class="lh-eyebrow">Beta</span>
      <h1 class="lh-headline">
        Scopri cosa c'&egrave; davvero<br class="lh-br">
        nei tuoi ETF
      </h1>
      <p class="lh-sub">
        Analizza overlap, ridondanza e factor exposure
        del tuo portafoglio in&nbsp;30&nbsp;secondi.
        Gratis.
      </p>
      <div class="lh-pills">
        <span class="lh-pill">&#128269; X-Ray holdings</span>
        <span class="lh-pill">&#128202; Overlap analysis</span>
        <span class="lh-pill">&#127919; Factor fingerprint</span>
      </div>
      <a class="lh-arrow" href="#portfolio-input"
         aria-label="Vai al form di analisi">&#8595;</a>
    </div>
  </section>

  <section id="portfolio-input"></section>

  <div id="loading-overlay" hidden>
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loading-msg">Scarico composizione ETF...</p>
    </div>
  </div>

  <main id="report" hidden>
    <div id="hero-bar"></div>
    <section id="s-xray" class="report-section"></section>
    <div class="scroll-cue" aria-hidden="true"></div>
    <section id="s-overlap" class="report-section"></section>
    <div class="scroll-cue" aria-hidden="true"></div>
    <section id="s-sector" class="report-section"></section>
    <div class="scroll-cue" aria-hidden="true"></div>
    <section id="s-factor" class="report-section"></section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
